theme = "tokyonight"

[editor]
idle-timeout = 50
true-color = true
mouse = false
shell = ["fish", "-c"]
completion-replace = true
bufferline = "multiple"
rulers = []

[editor.cursor-shape]
normal = "block"
insert = "bar"
select = "block"

[editor.file-picker]
hidden = false

[editor.soft-wrap]
enable = true

[keys.normal]
C-w = ":sh tmux split-window -h -c '#{pane_current_path}'"
C-g = [":new", ":insert-output lazygit", ":buffer-close!", ":redraw", ":reload-all"]
C-y = [
  ':sh rm -f /tmp/unique-file',
  ':insert-output yazi "%{buffer_name}" --chooser-file=/tmp/unique-file',
  ':sh printf "\x1b[?1049h\x1b[?2004h" > /dev/tty',
  ':open %sh{cat /tmp/unique-file}',
  ':redraw',
]
