use-grammars = { only = [ "rust", "nix", "cpp", "haskell", "scheme", "lean", "markdown" ] }

[[language]]
name = "rust"
file-types = [ "rs" ]
indent = { tab-width = 4, unit = "    " }
language-servers = ["rust-analyzer"]
auto-format = false

[[language]]
name = "cpp"
file-types = [ "cpp", "hpp", "c", "h", "cppm", "cc" ,"hh" ]
indent = { tab-width = 4, unit = "    " }
language-servers = ["clangd"]
auto-format = false

[[language]]
name = "lean"
file-types = [ "lean" ]
indent = { tab-width = 4, unit = "    " }
language-servers = ["lean"]
rulers = []

# # Route Helix's lean LSP through the lean-helix-view proxy
# # https://github.com/wyattgill9/lean-helix-view
# [language-server.lean]
# command = "lean-helix-view"
# args = ["proxy", "--", "lake", "serve"]

[[language]]
name = "haskell"
file-types = [ "hs" ]
indent = { tab-width = 4, unit = "    " }
language-servers = ["haskell-language-server"]
formatter = { command = "fourmolu" , args = ["--stdin-input-file", "%{buffer_name}"] }
auto-format = false

[language-server.haskell-language-server]
command = "haskell-language-server-wrapper"

[[language]]
name = "markdown"
file-types = [ "md", "mdx" ]
language-servers = ["markdown-oxide"]

[language-server.markdown-oxide]
command = "markdown-oxide"

[[language]]
name = "scheme"
language-servers = ["steel-language-server"]

[language-server.steel-language-server]
command = "steel-language-server"
args = []
