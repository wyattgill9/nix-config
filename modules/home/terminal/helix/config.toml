theme = "tokyonight"

[editor]
idle-timeout = 50
true-color = true
mouse = false
shell = ["fish", "-c"]
completion-replace = true
bufferline = "multiple"
rulers = []

[editor.cursor-shape]
normal = "block"
insert = "bar"
select = "block"

[editor.file-picker]
hidden = false

[keys.normal]
g = { q = [":new", ":insert-output lazygit", ":buffer-close!", ":redraw", ":reload-all"] }

